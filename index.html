<!-- Motor do cometa: velocidade aleatória por arco (retas + curvas), com teto/piso -->
<script>
(function () {
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  // Limites (graus/seg): teto = velocidade máxima atual; piso = não tão lento.
  var V_MAX = 122;            // nunca mais rápido que isto
  var CURVE = [90, 122];      // curvas (cantos) — rápidas, sorteadas
  var STRAIGHT = [56, 86];    // retas — mais calmas, sorteadas
  function rand(a, b) { return a + Math.random() * (b - a); }
  function pickSpeed(arc) {
    // arcos ímpares = curvas/cantos; pares = retas
    var r = (arc % 2 === 1) ? rand(CURVE[0], CURVE[1]) : rand(STRAIGHT[0], STRAIGHT[1]);
    return Math.min(r, V_MAX);
  }

  var active = new Map(); // cell -> state

  function start(cell) {
    if (reduce || active.has(cell)) return;
    var st = { angle: 0, arc: -1, speed: 0, last: null, raf: 0 };
    active.set(cell, st);
    function frame(t) {
      if (st.last == null) st.last = t;
      var dt = (t - st.last) / 1000;
      st.last = t;
      if (dt > 0.1) dt = 0.1; // evita salto após aba inativa
      var arc = Math.floor(st.angle / 45) % 8;
      if (arc !== st.arc) { st.arc = arc; st.speed = pickSpeed(arc); }
      st.angle += st.speed * dt;
      if (st.angle >= 360) { st.angle -= 360; st.arc = -1; } // nova volta → re-sorteia
      cell.style.setProperty('--v5-angle', st.angle.toFixed(2) + 'deg');
      st.raf = requestAnimationFrame(frame);
    }
    st.raf = requestAnimationFrame(frame);
  }
  function stop(cell) {
    var st = active.get(cell);
    if (!st) return;
    cancelAnimationFrame(st.raf);
    active.delete(cell);
    cell.style.setProperty('--v5-angle', '0deg');
  }

  // Delegação: funciona mesmo com os cards renderizados depois pelo React.
  document.addEventListener('mouseover', function (e) {
    var cell = e.target.closest && e.target.closest('.v5-cell');
    if (cell && !active.has(cell)) start(cell);
  });
  document.addEventListener('mouseout', function (e) {
    var cell = e.target.closest && e.target.closest('.v5-cell');
    if (cell && (!e.relatedTarget || !cell.contains(e.relatedTarget))) stop(cell);
  });
})();
</script>
