<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <radialGradient id="glow" cx="82%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#F87453" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#F87453" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F87453"/>
      <stop offset="70%" stop-color="#56D1A3"/>
      <stop offset="100%" stop-color="#8FE9C8"/>
    </linearGradient>
    <style>
      .display { font-family: "Bricolage Grotesque", "Manrope", Arial, sans-serif; font-weight: 800; }
      .body    { font-family: "Manrope", Arial, sans-serif; }
      .mono    { font-family: "JetBrains Mono", "SFMono-Regular", Menlo, monospace; }
    </style>
  </defs>

  <!-- fundo -->
  <rect width="1200" height="630" fill="#FCFAF6"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- lockup da marca -->
  <rect x="80" y="70" width="88" height="88" rx="22" fill="#F87453"/>
  <text x="124" y="132" class="display" font-size="54" fill="#FFFFFF" text-anchor="middle">S</text>
  <text x="188" y="130" class="display" font-size="42" fill="#10111A">SimplesMEI</text>

  <!-- eyebrow -->
  <circle cx="92" cy="250" r="6" fill="#25D366"/>
  <text x="108" y="256" class="mono" font-size="20" fill="#D9572F">A IA que cuida do fiscal do MEI · no WhatsApp</text>

  <!-- headline -->
  <text x="78" y="360" class="display" font-size="78" fill="#10111A">Seu fiscal do MEI,</text>
  <text x="78" y="448" class="display" font-size="78" fill="#10111A">dentro do <tspan fill="#F87453">WhatsApp.</tspan></text>

  <!-- linha de acento coral → mint -->
  <rect x="80" y="486" width="280" height="8" rx="4" fill="url(#accent)"/>

  <!-- subtítulo -->
  <text x="80" y="548" class="body" font-size="29" fill="#595B68">Emite a NFS-e, cuida do DAS e vigia o teto — numa conversa.</text>

  <!-- rodapé -->
  <text x="80" y="598" class="mono" font-size="22" fill="#D9572F">simplesmei.net</text>
</svg>
